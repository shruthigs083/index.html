<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batchmate | Cyber Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00ff41; --bg: #050505; --card: #111111; --border: #222222; --text: #ffffff; --map-filter: invert(100%) hue-rotate(180deg) brightness(95%); }
        body.light-mode { --bg: #f4f4f4; --card: #ffffff; --border: #dddddd; --text: #1a1a1a; --map-filter: none; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: var(--card); border: 1px solid var(--border); transition: all 0.3s ease; color: var(--text); }
        .glass-card:hover { border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 255, 65, 0.15); }
        .input-dark { background: var(--card); border: 1px solid var(--border); color: var(--text); transition: border-color 0.3s; width: 100%; }
        .input-dark:focus { border-color: var(--neon); outline: none; }
        
        /* MAP STYLING */
        #map { height: 500px; width: 100%; border-radius: 24px; border: 1px solid var(--border); margin-top: 3rem; filter: var(--map-filter); z-index: 1; }
        
        /* VISUAL INDICATOR (PULSE ANIMATION) */
        .pulse-marker {
            width: 12px;
            height: 12px;
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(0, 255, 65, 0.4);
            animation: pulse 2s infinite;
            border: 2px solid white;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }
        .map-label { background: black; color: var(--neon); padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; border: 1px solid var(--neon); white-space: nowrap; margin-top: -35px; margin-left: -15px; position: absolute; }

        .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; border: 1px solid var(--border); }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 3px; background-color: var(--neon); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--neon); }
        input:checked + .slider:before { transform: translateX(30px); background-color: black; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-12">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-6xl font-extrabold tracking-tighter italic uppercase leading-none">BATCH<span class="text-[#00ff41]">MATE</span></h1>
                <p class="mono text-[10px] uppercase tracking-[0.5em] opacity-40 mt-2">Network Directory v7.0</p>
            </div>
            <div class="flex items-center gap-4">
                <label class="switch"><input type="checkbox" id="modeToggle" onclick="toggleTheme()"><span class="slider"></span></label>
            </div>
        </div>
        <div class="flex flex-col md:flex-row justify-between items-end gap-6">
            <div class="flex flex-wrap gap-4 w-full md:w-auto items-center">
                <input type="text" id="searchInput" placeholder="Search name or stack..." class="input-dark px-6 py-4 rounded-xl text-xs uppercase tracking-widest flex-grow md:w-80">
                <button onclick="findNearMe()" id="nearMeBtn" class="bg-white/5 border border-white/10 text-white font-bold px-6 py-4 rounded-xl text-[10px] uppercase hover:border-[#00ff41] transition">Near Me 📍</button>
                <button onclick="openRegisterModal()" class="bg-[#00ff41] text-black font-extrabold px-8 py-4 rounded-xl text-xs uppercase hover:bg-white transition">Register</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="hidden md:grid grid-cols-4 px-8 py-4 mono text-[10px] uppercase tracking-widest opacity-40 border-b border-white/10 mb-4">
            <div>Candidate Info</div><div>Stack</div><div>Live Location</div><div class="text-right">Action</div>
        </div>
        <div id="directory" class="space-y-3"></div>
        
        <!-- MAP SECTION -->
        <div class="mt-12">
            <h3 class="mono text-[10px] uppercase tracking-widest opacity-40 mb-4 ml-2">Geographic Candidate Distribution</h3>
            <div id="map"></div>
        </div>
    </main>

    <!-- REGISTRATION MODAL -->
    <div id="entryModal" class="fixed inset-0 bg-black/95 z-[9999] hidden items-center justify-center p-4">
        <div class="bg-[#0a0a0a] border border-white/10 w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-3xl p-8 text-white">
            <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                <h2 id="modalTitle" class="mono text-[#00ff41] font-bold uppercase">Candidate Registration</h2>
                <button onclick="toggleModal('entryModal', false)" class="text-white text-2xl">✕</button>
            </div>
            <form id="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="name" placeholder="Full Name *" required class="input-dark p-4 rounded-xl text-sm">
                <input type="text" id="location" placeholder="City (e.g. Tumakuru) *" required class="input-dark p-4 rounded-xl text-sm">
                <input type="email" id="gmail" placeholder="Gmail Address *" required class="input-dark p-4 rounded-xl text-sm">
                <input type="url" id="github" placeholder="GitHub URL *" required class="input-dark p-4 rounded-xl text-sm">
                <select id="stack" required class="input-dark p-4 rounded-xl text-sm">
                    <option value="" disabled selected>Select Primary Stack *</option>
                    <option>Frontend Developer</option>
                    <option>Backend Developer</option>
                    <option>Full Stack Developer</option>
                    <option>UI/UX Designer</option>
                    <option>Mobile App Dev</option>
                    <option>DevOps Engineer</option>
                    <option>Data Scientist</option>
                </select>
                <input type="text" id="college" placeholder="College Name" class="input-dark p-4 rounded-xl text-sm">
                <input type="url" id="photo" placeholder="Direct Photo URL" class="input-dark p-4 rounded-xl text-sm">
                <input type="text" id="topAchieve" placeholder="Top Achievement *" required class="input-dark p-4 rounded-xl text-sm">
                <textarea id="projects" placeholder="Projects Worked Upon" class="md:col-span-2 input-dark p-4 rounded-xl text-sm h-24"></textarea>
                <textarea id="exp" placeholder="Internships / Experience" class="md:col-span-2 input-dark p-4 rounded-xl text-sm h-24"></textarea>
                <button type="submit" id="submitBtn" class="md:col-span-2 bg-[#00ff41] text-black font-black py-5 rounded-2xl uppercase tracking-widest hover:scale-[1.02] transition">Save Profile</button>
            </form>
        </div>
    </div>

    <!-- RESUME MODAL -->
    <div id="resumeModal" class="fixed inset-0 bg-black/98 z-[10000] hidden items-center justify-center p-4">
        <div id="resumeContent" class="bg-[#0f0f0f] border-2 border-[#00ff41] w-full max-w-2xl rounded-[2.5rem] p-10 relative overflow-hidden"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const map = L.map('map', { zoomControl: false }).setView([20.59, 78.96], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let markers = [];
        let profiles = JSON.parse(localStorage.getItem('batchmate_v7')) || [];

        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden', !show);
            modal.classList.toggle('flex', show);
        }

        function openRegisterModal() {
            document.getElementById('profileForm').reset();
            document.getElementById('editIndex').value = "-1";
            document.getElementById('modalTitle').innerText = "Candidate Registration";
            toggleModal('entryModal', true);
        }

        async function updateMapMarkers() {
            // Clear existing markers
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            for (let p of profiles) {
                if (!p.location) continue;

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(p.location)}`);
                    const data = await response.json();
                    
                    if (data[0]) {
                        const lat = parseFloat(data[0].lat);
                        const lon = parseFloat(data[0].lon);

                        const customIcon = L.divIcon({
                            className: 'custom-marker',
                            html: `<div class="pulse-marker"></div><div class="map-label">${p.name}</div>`
                        });

                        const m = L.marker([lat, lon], { icon: customIcon }).addTo(map)
                            .bindPopup(`<b class="mono" style="color:black">${p.name}</b><br><span style="color:black">${p.stack}</span>`);
                        markers.push(m);
                    }
                } catch (e) { console.error("Geocoding failed for:", p.location); }
            }
        }

        function render() {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            const dir = document.getElementById('directory');
            dir.innerHTML = '';
            
            profiles.forEach((p, i) => {
                if (!p.name.toLowerCase().includes(filter) && !p.stack.toLowerCase().includes(filter)) return;
                const defaultPic = `https://ui-avatars.com/api/?background=00ff41&color=000&name=${encodeURIComponent(p.name)}`;
                
                dir.innerHTML += `
                    <div class="glass-card rounded-2xl p-4 md:px-8 md:py-5 grid grid-cols-1 md:grid-cols-4 items-center gap-4">
                        <div class="flex items-center gap-4">
                            <img src="${p.photo || defaultPic}" class="w-12 h-12 rounded-full border border-white/10 object-cover">
                            <div class="overflow-hidden">
                                <p class="text-sm font-bold uppercase truncate leading-tight">${p.name}</p>
                                <p class="text-[9px] font-bold text-[#00ff41] uppercase truncate">${p.college || 'Freelance'}</p>
                            </div>
                        </div>
                        <div class="text-xs font-bold text-[#00ff41] mono uppercase">${p.stack}</div>
                        <div class="text-[11px] font-bold uppercase opacity-80 mono tracking-widest text-white">${p.location}</div>
                        <div class="text-right flex gap-2 justify-end">
                            <button onclick="editProfile(${i})" class="bg-white/5 border border-white/10 hover:border-[#00ff41] px-4 py-2 rounded-xl text-[9px] font-bold uppercase transition">Edit</button>
                            <button onclick="viewResume(${i})" class="bg-[#00ff41]/10 text-[#00ff41] border border-[#00ff41]/20 px-4 py-2 rounded-xl text-[9px] font-bold uppercase transition">Resume</button>
                        </div>
                    </div>`;
            });
            updateMapMarkers(); // Refresh markers on render
        }

        function editProfile(index) {
            const p = profiles[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('name').value = p.name;
            document.getElementById('location').value = p.location;
            document.getElementById('gmail').value = p.gmail;
            document.getElementById('github').value = p.github;
            document.getElementById('stack').value = p.stack;
            document.getElementById('college').value = p.college;
            document.getElementById('photo').value = p.photo;
            document.getElementById('topAchieve').value = p.topAchieve;
            document.getElementById('projects').value = p.projects;
            document.getElementById('exp').value = p.exp;
            document.getElementById('modalTitle').innerText = "Edit Candidate Profile";
            toggleModal('entryModal', true);
        }

        document.getElementById('profileForm').onsubmit = async function(e) {
            e.preventDefault();
            const index = parseInt(document.getElementById('editIndex').value);
            const data = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                gmail: document.getElementById('gmail').value,
                github: document.getElementById('github').value,
                stack: document.getElementById('stack').value,
                college: document.getElementById('college').value,
                photo: document.getElementById('photo').value,
                topAchieve: document.getElementById('topAchieve').value,
                projects: document.getElementById('projects').value,
                exp: document.getElementById('exp').value
            };
            if (index === -1) profiles.unshift(data);
            else profiles[index] = data;
            
            localStorage.setItem('batchmate_v7', JSON.stringify(profiles));
            toggleModal('entryModal', false);
            
            // Immediate Render and Map Update
            render();

            // Glide map to the new/updated candidate's location immediately
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(data.location)}`);
                const geoData = await response.json();
                if (geoData[0]) {
                    map.flyTo([parseFloat(geoData[0].lat), parseFloat(geoData[0].lon)], 10);
                }
            } catch (err) { console.error("Immediate geofocus failed."); }
        };

        function viewResume(index) {
            const p = profiles[index];
            const defaultPic = `https://ui-avatars.com/api/?background=00ff41&color=000&bold=true&name=${encodeURIComponent(p.name)}`;
            document.getElementById('resumeContent').innerHTML = `
                <div class="absolute top-0 right-0 p-8"><button onclick="toggleModal('resumeModal', false)" class="text-3xl opacity-30 hover:opacity-100 text-white">✕</button></div>
                <div class="flex flex-col md:flex-row gap-8 items-center md:items-start text-white">
                    <img src="${p.photo || defaultPic}" class="w-32 h-32 rounded-3xl object-cover border-4 border-[#00ff41]">
                    <div>
                        <h2 class="text-4xl font-black uppercase italic tracking-tighter">${p.name}</h2>
                        <p class="text-[#00ff41] font-bold mono text-xs uppercase mb-4">${p.stack}</p>
                        <p class="text-sm opacity-60">${p.location} • ${p.college}</p>
                    </div>
                </div>`;
            toggleModal('resumeModal', true);
        }

        async function findNearMe() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const userLat = pos.coords.latitude;
                const userLon = pos.coords.longitude;
                map.setView([userLat, userLon], 10);
                render(); 
            });
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        document.getElementById('searchInput').oninput = render;
        window.onload = render;
    </script>
</body>
</html>
